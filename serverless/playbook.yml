---
- name: Install LLM Worker using Docker and NFS
  hosts: all
  become: true

  vars:
    efs_ip: "fs-0e3b1c22a8513135a.efs.us-east-1.amazonaws.com"
    share_path: "/share"
    llm_data: "/share/llm"
    docker_compose_dir: "/opt/llm"

  tasks:

    ############################################################
    # Install Packages
    ############################################################

    - name: Update apt cache
      apt:
        update_cache: yes
      tags: [always]

    - name: Install required packages
      apt:
        name:
          - docker.io
          - docker-compose-v2
          - nfs-common
          - curl
          - gpg
        state: present
      tags: [packages]

    ############################################################
    # NFS / EFS
    ############################################################

    - name: Create share directory
      file:
        path: "{{ share_path }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      tags: [nfs]

    - name: Check if EFS already mounted
      shell: mount | grep -q "{{ efs_ip }}:/"
      register: nfs_mounted
      ignore_errors: true
      changed_when: false
      tags: [nfs]

    - name: Mount EFS
      mount:
        src: "{{ efs_ip }}:/"
        path: "{{ share_path }}"
        fstype: nfs4
        opts: defaults,_netdev
        state: mounted
      when: nfs_mounted.rc != 0
      tags: [nfs]

    - name: Persist mount in fstab
      lineinfile:
        path: /etc/fstab
        line: "{{ efs_ip }}:/ {{ share_path }} nfs4 defaults,_netdev 0 0"
        state: present
      tags: [nfs]

    ############################################################
    # Docker
    ############################################################

    - name: Enable Docker service
      systemd:
        name: docker
        state: started
        enabled: yes
      tags: [docker]

    - name: Verify Docker Compose
      command: docker compose version
      register: compose_version
      changed_when: false
      tags: [docker]

    - debug:
        var: compose_version.stdout
      tags: [docker]

    ############################################################
    # Docker Compose Files
    ############################################################

    - name: Create Docker Compose directory
      file:
        path: "{{ docker_compose_dir }}"
        state: directory
        mode: "0755"
      tags: [docker]

    - name: Create docker-compose.yml
      copy:
        dest: "{{ docker_compose_dir }}/docker-compose.yml"
        mode: "0644"
        content: |
          services:
            llm:
              image: ollama/ollama:latest
              container_name: llm
              restart: always
              ports:
                - "11434:11434"
              volumes:
                - {{ llm_data }}:/root/.ollama
                - /share/tmp:/tmp
              environment:
                - OLLAMA_CONFIG=/var/lib/ollama/config.yaml
      tags: [docker]

    ############################################################
    # Run Container
    ############################################################

    - name: Pull latest Ollama image
      command: docker pull ollama/ollama:latest
      tags: [docker]

    - name: Start Ollama container
      command: docker compose up -d
      args:
        chdir: "{{ docker_compose_dir }}"
      tags: [docker]

    ############################################################
    # Validation
    ############################################################

    - name: Wait until Ollama API is ready
      uri:
        url: http://127.0.0.1:11434/api/tags
        method: GET
        status_code: 200
      register: ollama_check
      retries: 20
      delay: 10
      until: ollama_check.status == 200
      tags: [verify]

  handlers:

    - name: Restart Docker
      systemd:
        name: docker
        state: restarted
